version: "3.9"

services:

  # ── API Flask ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banking_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      FLASK_APP: run.py
      FLASK_DEBUG: "true"
      DATABASE_URL: postgresql://banking_user:banking_pass@db:5432/banking_db
      SECRET_KEY: dev-secret-change-in-production
      JWT_SECRET_KEY: dev-jwt-secret-change-in-production
      JWT_ACCESS_TOKEN_EXPIRES: "900"
      JWT_REFRESH_TOKEN_EXPIRES: "604800"
      MAX_LOGIN_ATTEMPTS: "5"
      LOCKOUT_DURATION: "1800"
      DEFAULT_DAILY_WITHDRAWAL_LIMIT: "500000"
      DEFAULT_DAILY_DEPOSIT_LIMIT: "5000000"
      DEFAULT_TRANSFER_LIMIT: "2000000"
      HIGH_VALUE_THRESHOLD: "1000000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "flask db upgrade &&
             flask seed &&
             flask run --host=0.0.0.0 --port=5000 --debug"
    networks:
      - banking_network

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: banking_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       banking_db
      POSTGRES_USER:     banking_user
      POSTGRES_PASSWORD: banking_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_user -d banking_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking_network

  # ── Redis (blacklist JWT + cache) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: banking_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking_network

  # ── Adminer (interface web base de données) ────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: banking_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - banking_network

volumes:
  postgres_data:
  redis_data:

networks:
  banking_network:
    driver: bridge
